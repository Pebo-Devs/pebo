name: Release

# Builds native installers/packages for every platform and attaches them to a
# GitHub Release.
#
# It runs in three situations:
#   1. A version tag is pushed (e.g. `v1.2.0`)      -> release exactly that tag.
#   2. A commit lands on `main` (e.g. a PR merge)    -> ALWAYS cut a new release.
#      The next version is derived automatically: by default it bumps the patch of
#      the latest release (v1.1.0 -> v1.1.1 -> ...), so every merge ships. To force a
#      specific minor/major, bump `appVersion` in composeApp/build.gradle.kts above
#      the latest release; that exact version ships next, then auto-patch resumes.
#   3. Manually via "Run workflow" (optionally typing a version to (re)build).
#
# So: just merge your PR to main and the next `vX.Y.Z` release is cut automatically
# (bump `appVersion` first only to force a specific minor/major), with
# the installers attached, which is exactly what the in-app updater looks for.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v1.2.0). Leave blank to use the version in composeApp/build.gradle.kts."
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_release: ${{ steps.resolve.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and whether a release is needed
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        shell: bash
        run: |
          set -uo pipefail

          repo="${{ github.repository }}"

          # Highest existing release version (leading 'v' stripped); 0.0.0 if none.
          latest=$(gh release list -R "$repo" --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null \
                   | sed 's/^v//' | grep -E '^[0-9]+(\.[0-9]+){0,2}$' | sort -V | tail -1)
          latest="${latest:-0.0.0}"

          # The version baked into build.gradle.kts ( ... ?: "1.1.0" ) is a manual
          # override: bump it above the latest release to force a specific minor/major.
          file_raw=$(grep -E '^[[:space:]]*\?:[[:space:]]*"[0-9]+(\.[0-9]+)*"' composeApp/build.gradle.kts \
                     | head -1 | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
          file_version="${file_raw:-0.0.0}"

          # Normalise a version to MAJOR.MINOR.PATCH so arithmetic/compares are safe.
          norm() { local a b c; IFS=. read -r a b c <<< "$1"; echo "${a:-0}.${b:-0}.${c:-0}"; }
          latest_n=$(norm "$latest")
          file_n=$(norm "$file_version")

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Triggered by a pushed tag: release exactly that tag (idempotent).
            version="${{ github.ref_name }}"
          elif [[ -n "${DISPATCH_VERSION}" ]]; then
            # Manual run with an explicit version typed in (idempotent).
            version="${DISPATCH_VERSION}"
          else
            # Push to main (a PR merge) or manual run with no version: ALWAYS ship a
            # release by auto-deriving the next version. Honour a manual appVersion bump
            # when it is above the latest release; otherwise bump the latest patch so
            # every merge produces a new version.
            higher=$(printf '%s\n%s\n' "$file_n" "$latest_n" | sort -V | tail -1)
            if [[ "$higher" == "$file_n" && "$file_n" != "$latest_n" ]]; then
              candidate="$file_n"
            else
              IFS=. read -r a b c <<< "$latest_n"
              candidate="${a}.${b}.$((c + 1))"
            fi
            # Never collide with an existing release (bump the patch until it is free).
            IFS=. read -r a b c <<< "$candidate"
            while gh release view "v${a}.${b}.${c}" -R "$repo" >/dev/null 2>&1; do
              c=$((c + 1))
            done
            version="v${a}.${b}.${c}"
          fi

          # Normalise to a leading 'v'.
          [[ "$version" == v* ]] || version="v${version}"
          echo "Resolved target version: $version (latest release: v${latest})"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if gh release view "$version" -R "$repo" >/dev/null 2>&1; then
            echo "Release $version already exists — skipping the build (nothing to release)."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $version does not exist yet — building installers and cutting it."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  windows:
    name: Windows installers (.msi + .exe)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # jpackage needs WiX Toolset 3.x (candle.exe/light.exe) to build .msi/.exe.
      # The `wixtoolset` Chocolatey package tracks the WiX 3.x line (WiX 4/5 ship
      # separately), so installing latest reliably yields a jpackage-compatible 3.x.
      - name: Install WiX Toolset 3.x
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $bin = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset v3*' |
                 Sort-Object Name -Descending | Select-Object -First 1
          if ($bin) {
            $binPath = Join-Path $bin.FullName 'bin'
            $binPath | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            Write-Host "Added WiX to PATH: $binPath"
          } else {
            Write-Warning "WiX install directory not found"
          }

      - name: Package MSI and EXE
        shell: bash
        run: ./gradlew :composeApp:packageMsi :composeApp:packageExe -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/msi/*.msi dist/ 2>/dev/null || true
          cp composeApp/build/compose/binaries/main/exe/*.exe dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-windows
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true

  macos:
    name: macOS installer (.dmg)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Package DMG
        run: ./gradlew :composeApp:packageDmg -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/dmg/*.dmg dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-macos
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true

  linux:
    name: Linux package (.deb)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Package DEB
        run: ./gradlew :composeApp:packageDeb -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/deb/*.deb dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-linux
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true

  android:
    name: Android package (.apk)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :composeApp:assembleDebug -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p dist
          cp composeApp/build/outputs/apk/debug/composeApp-debug.apk "dist/Pebo-${RELEASE_VERSION}.apk"
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-android
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true
