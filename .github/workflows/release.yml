name: Release

# Builds native installers/packages for every platform and attaches them to a
# GitHub Release.
#
# It runs in three situations:
#   1. A version tag is pushed (e.g. `v1.2.0`)  -> release that tag.
#   2. A commit lands on `main` (e.g. a PR merge) -> if the app version in
#      composeApp/build.gradle.kts has been bumped to a version that does NOT
#      already have a release, cut that release automatically. If the release
#      already exists, the build jobs are skipped (idempotent — re-merging a PR
#      that didn't bump the version does nothing).
#   3. Manually via "Run workflow" (optionally typing a version to (re)build).
#
# So: to ship a new release, bump `appVersion` in composeApp/build.gradle.kts in
# your PR. When it merges to main, the matching `vX.Y.Z` release is created with
# the installers attached, which is exactly what the in-app updater looks for.
#
# Google Drive sync: the public client ids ship baked into the app, but Google's
# desktop token exchange also needs a (non-confidential) client secret. Add it as a
# repository Actions secret named `PEBO_GOOGLE_CLIENT_SECRET` so release builds bake
# it in. If the secret is absent the build still succeeds; Google Drive just shows
# as "Needs setup" until a secret is provided. OneDrive needs no secret.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v1.2.0). Leave blank to use the version in composeApp/build.gradle.kts."
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_release: ${{ steps.resolve.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and whether a release is needed
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        shell: bash
        run: |
          set -uo pipefail

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Triggered by a pushed tag: release exactly that tag.
            version="${{ github.ref_name }}"
          elif [[ -n "${DISPATCH_VERSION}" ]]; then
            # Manual run with an explicit version typed in.
            version="${DISPATCH_VERSION}"
          else
            # Branch push (or manual run with no version): read the single source
            # of truth from build.gradle.kts ( ... ?: "1.0.0" ).
            raw=$(grep -E '^[[:space:]]*\?:[[:space:]]*"[0-9]+(\.[0-9]+)*"' composeApp/build.gradle.kts \
                  | head -1 | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
            if [[ -z "${raw:-}" ]]; then
              echo "::error::Could not determine appVersion from composeApp/build.gradle.kts"
              echo "version=" >> "$GITHUB_OUTPUT"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            version="v${raw}"
          fi

          # Normalise to a leading 'v'.
          [[ "$version" == v* ]] || version="v${version}"
          echo "Resolved target version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if gh release view "$version" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $version already exists — skipping the build (nothing to release)."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $version does not exist yet — building installers and cutting it."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  windows:
    name: Windows installers (.msi + .exe)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # jpackage needs WiX Toolset 3.x (candle.exe/light.exe) to build .msi/.exe.
      # The `wixtoolset` Chocolatey package tracks the WiX 3.x line (WiX 4/5 ship
      # separately), so installing latest reliably yields a jpackage-compatible 3.x.
      - name: Install WiX Toolset 3.x
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $bin = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset v3*' |
                 Sort-Object Name -Descending | Select-Object -First 1
          if ($bin) {
            $binPath = Join-Path $bin.FullName 'bin'
            $binPath | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            Write-Host "Added WiX to PATH: $binPath"
          } else {
            Write-Warning "WiX install directory not found"
          }

      - name: Package MSI and EXE
        shell: bash
        env:
          PEBO_GOOGLE_CLIENT_SECRET: ${{ secrets.PEBO_GOOGLE_CLIENT_SECRET }}
        run: ./gradlew :composeApp:packageMsi :composeApp:packageExe -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/msi/*.msi dist/ 2>/dev/null || true
          cp composeApp/build/compose/binaries/main/exe/*.exe dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-windows
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true

  macos:
    name: macOS installer (.dmg)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Package DMG
        env:
          PEBO_GOOGLE_CLIENT_SECRET: ${{ secrets.PEBO_GOOGLE_CLIENT_SECRET }}
        run: ./gradlew :composeApp:packageDmg -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/dmg/*.dmg dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-macos
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true

  linux:
    name: Linux package (.deb)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Package DEB
        env:
          PEBO_GOOGLE_CLIENT_SECRET: ${{ secrets.PEBO_GOOGLE_CLIENT_SECRET }}
        run: ./gradlew :composeApp:packageDeb -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/deb/*.deb dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-linux
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true

  android:
    name: Android package (.apk)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        env:
          PEBO_GOOGLE_CLIENT_SECRET: ${{ secrets.PEBO_GOOGLE_CLIENT_SECRET }}
        run: ./gradlew :composeApp:assembleDebug -PappVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Collect artifacts
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p dist
          cp composeApp/build/outputs/apk/debug/composeApp-debug.apk "dist/Pebo-${RELEASE_VERSION}.apk"
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-android
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true
