name: Release

# Builds native installers/packages for every platform and attaches them to a
# GitHub Release. Trigger by pushing a version tag (e.g. `v1.0.0`) or manually.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows installers (.msi + .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # jpackage needs WiX Toolset 3.x (candle.exe/light.exe) to build .msi/.exe.
      # The `wixtoolset` Chocolatey package tracks the WiX 3.x line (WiX 4/5 ship
      # separately), so installing latest reliably yields a jpackage-compatible 3.x.
      - name: Install WiX Toolset 3.x
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $bin = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset v3*' |
                 Sort-Object Name -Descending | Select-Object -First 1
          if ($bin) {
            $binPath = Join-Path $bin.FullName 'bin'
            $binPath | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            Write-Host "Added WiX to PATH: $binPath"
          } else {
            Write-Warning "WiX install directory not found"
          }

      - name: Package MSI and EXE
        shell: bash
        run: ./gradlew :composeApp:packageMsi :composeApp:packageExe -PappVersion=${{ github.ref_name }} --stacktrace

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/msi/*.msi dist/ 2>/dev/null || true
          cp composeApp/build/compose/binaries/main/exe/*.exe dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-windows
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  macos:
    name: macOS installer (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Package DMG
        run: ./gradlew :composeApp:packageDmg -PappVersion=${{ github.ref_name }} --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/dmg/*.dmg dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-macos
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  linux:
    name: Linux package (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Package DEB
        run: ./gradlew :composeApp:packageDeb -PappVersion=${{ github.ref_name }} --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp composeApp/build/compose/binaries/main/deb/*.deb dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-linux
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  android:
    name: Android package (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          name="${GITHUB_REF_NAME:-dev}"
          cp composeApp/build/outputs/apk/debug/composeApp-debug.apk "dist/Pebo-${name}.apk"
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pebo-android
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
